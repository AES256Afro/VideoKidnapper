name: Feature request
description: Suggest a new capability or improvement.
title: "[Feature] "
labels: ["enhancement"]
body:
  - type: textarea
    id: problem
    attributes:
      label: What's the problem?
      placeholder: |
        I'm trying to ... and currently have to ... because the app doesn't ...
    validations:
      required: true

  - type: textarea
    id: idea
    attributes:
      label: Proposed solution
      description: How would this look in the UI? What command-line flag? Rough mock OK.

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives you've considered

  - type: dropdown
    id: scope
    attributes:
      label: Scope
      options:
        - Quick tweak to an existing feature
        - New UI element
        - New backend capability (ffmpeg filter, yt-dlp option, etc.)
        - New tab or major feature
        - Not sure
