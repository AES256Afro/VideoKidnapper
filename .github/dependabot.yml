version: 2
updates:
  # Python runtime deps — yt-dlp in particular changes monthly as platforms
  # shift their extractors; letting Dependabot open PRs keeps us current.
  - package-ecosystem: "pip"
    directory: "/"
    schedule:
      interval: "weekly"
    open-pull-requests-limit: 5
    labels:
      - "dependencies"
    groups:
      non-major:
        update-types: ["minor", "patch"]

  # Keep GitHub Actions themselves up to date.
  - package-ecosystem: "github-actions"
    directory: "/"
    schedule:
      interval: "monthly"
    labels:
      - "dependencies"
      - "ci"
