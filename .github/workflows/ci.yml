name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test:
    name: Tests on ${{ matrix.os }} / Python ${{ matrix.python }}
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, windows-latest]
        python: ["3.11", "3.12"]
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python }}
          cache: pip

      # Ubuntu runners don't include the Tk development headers by default;
      # several modules import tkinter at load time, so pytest collection
      # needs it even though the tests themselves don't open windows.
      - name: Install system Tk + ffmpeg (Ubuntu)
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y python3-tk ffmpeg

      # Windows runners come with ffmpeg via choco-provided toolchain in
      # some images, but it's not guaranteed — install explicitly so
      # the integration test has a binary to invoke.
      - name: Install ffmpeg (Windows)
        if: runner.os == 'Windows'
        shell: pwsh
        run: |
          choco install ffmpeg -y --no-progress

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest

      - name: Run tests
        run: python -m pytest tests/ -q

  lint:
    name: Ruff
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6
      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip
      - run: pip install ruff
      - run: ruff check videokidnapper/ main.py scripts/ tests/

  typecheck:
    name: mypy
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip
      # mypy.ini starts with strict=true as the default, then opts
      # per-module out via ignore_errors=true. Each module that gets
      # type-hinted joins the strict set (see mypy.ini for the
      # allowlist). Rest of the tree is silently skipped — Tkinter /
      # customtkinter / yt-dlp have no usable stubs, so typing them
      # would be punishment for little gain.
      - name: Install mypy
        run: pip install mypy
      - name: Type-check the typed module set
        run: mypy --config-file mypy.ini videokidnapper
