# SPDX-License-Identifier: Apache-2.0
#
# On every tag push (v*.*.*), build a standalone Windows .exe via
# PyInstaller and attach it to the GitHub Release. Decoupled from the
# PyPI release workflow so a failure in one doesn't block the other.
#
# What users get: download VideoKidnapper.exe from the release page,
# double-click. No Python install required. FFmpeg still has to be on
# PATH (or pulled via the in-app Setup dialog on first launch).

name: Windows installer

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Also trigger on manual dispatch so maintainers can rebuild the
  # installer for an existing tag without re-tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the installer to (e.g. v1.2.0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build .exe
        shell: pwsh
        run: |
          pyinstaller packaging/videokidnapper.spec --noconfirm --clean
          if (-not (Test-Path dist/VideoKidnapper.exe)) {
              Write-Error "PyInstaller did not produce dist/VideoKidnapper.exe"
              exit 1
          }
          Get-Item dist/VideoKidnapper.exe | Select-Object Name, Length

      - name: Smoke-test — --help exits 0
        shell: pwsh
        # Trivial "did the binary even load" check. Full GUI boot needs a
        # display; CI runners don't have one, but argparse handles --help
        # before Tk is imported, so it catches import-time / bundling
        # regressions. Using --help (not --version) keeps the workflow
        # wire-compatible with main before the feat/pypi-packaging PR
        # adds the --version flag.
        run: |
          dist/VideoKidnapper.exe --help
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      # Resolve the version string for Inno Setup. On a tag push this is
      # the tag (stripped of the leading `v`); on workflow_dispatch it's
      # whatever the user provided. Fed to iscc as /DMyAppVersion=… so
      # the installer file name carries the right number.
      - name: Resolve installer version
        id: version
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            raw="${{ github.event.inputs.tag }}"
          else
            raw="${GITHUB_REF_NAME}"
          fi
          # Strip leading "v" if present.
          echo "version=${raw#v}" >> "$GITHUB_OUTPUT"

      - name: Install Inno Setup
        shell: pwsh
        # choco ships Inno Setup 6.x; the iscc compiler lands on PATH
        # automatically. Free for commercial + open-source use.
        run: |
          choco install innosetup -y --no-progress

      - name: Compile Inno Setup installer
        shell: pwsh
        # Produces dist/VideoKidnapper-Setup-<version>.exe. The .iss
        # script's OutputDir is repo-relative; we run from the repo root
        # so it lands next to the portable .exe.
        run: |
          iscc.exe /DMyAppVersion=${{ steps.version.outputs.version }} `
            packaging\inno-setup\videokidnapper.iss
          $installer = Get-ChildItem dist\VideoKidnapper-Setup-*.exe | Select-Object -First 1
          if (-not $installer) {
              Write-Error "Inno Setup did not produce an installer .exe"
              exit 1
          }
          Write-Host "Installer: $($installer.FullName) ($([int]($installer.Length/1MB)) MB)"

      - name: Upload artifacts (PR builds + tag pushes)
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: VideoKidnapper-windows
          # Glob captures both the portable .exe and the Setup installer.
          path: |
            dist/VideoKidnapper.exe
            dist/VideoKidnapper-Setup-*.exe
          retention-days: 30

  attach:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download built installer
        uses: actions/download-artifact@v4
        with:
          name: VideoKidnapper-windows
          path: dist/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload .exe + installer to release
        env:
          GH_TOKEN: ${{ github.token }}
        # Both files: the Inno Setup `VideoKidnapper-Setup-X.Y.Z.exe`
        # for the 90% of users who want a proper install wizard, and
        # the portable `VideoKidnapper.exe` for everyone else. The glob
        # tolerates either file missing (e.g. if the Inno Setup compile
        # failed but we still want the portable build shipped).
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          shopt -s nullglob
          assets=(dist/VideoKidnapper.exe dist/VideoKidnapper-Setup-*.exe)
          if [ ${#assets[@]} -eq 0 ]; then
            echo "No installer artifacts found"
            exit 1
          fi
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --notes $'Windows builds for '"$tag"$'.\n\n- `VideoKidnapper-Setup-*.exe` — proper installer (Start Menu shortcut, Programs & Features entry, clean uninstall).\n- `VideoKidnapper.exe` — portable single-file build, double-click to run.\n\nFFmpeg must be on PATH or installed via the in-app Setup dialog on first launch.'
          fi
