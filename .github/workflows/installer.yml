# SPDX-License-Identifier: Apache-2.0
#
# On every tag push (v*.*.*), build a standalone Windows .exe via
# PyInstaller and attach it to the GitHub Release. Decoupled from the
# PyPI release workflow so a failure in one doesn't block the other.
#
# What users get: download VideoKidnapper.exe from the release page,
# double-click. No Python install required. FFmpeg still has to be on
# PATH (or pulled via the in-app Setup dialog on first launch).

name: Windows installer

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Also trigger on manual dispatch so maintainers can rebuild the
  # installer for an existing tag without re-tagging.
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the installer to (e.g. v1.2.0)"
        required: true

permissions:
  contents: read

jobs:
  build:
    name: Build Windows .exe
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pyinstaller>=6.0

      - name: Build .exe
        shell: pwsh
        run: |
          pyinstaller packaging/videokidnapper.spec --noconfirm --clean
          if (-not (Test-Path dist/VideoKidnapper.exe)) {
              Write-Error "PyInstaller did not produce dist/VideoKidnapper.exe"
              exit 1
          }
          Get-Item dist/VideoKidnapper.exe | Select-Object Name, Length

      - name: Smoke-test — --version exits 0
        shell: pwsh
        # A trivial "did the binary even load" check. Full GUI boot needs
        # a display; CI runners don't have one, but --version should
        # still work since argparse short-circuits before Tk is imported.
        run: |
          dist/VideoKidnapper.exe --version
          if ($LASTEXITCODE -ne 0) { exit $LASTEXITCODE }

      - name: Upload artifact (PR builds)
        if: github.event_name == 'workflow_dispatch' || startsWith(github.ref, 'refs/tags/')
        uses: actions/upload-artifact@v4
        with:
          name: VideoKidnapper-windows
          path: dist/VideoKidnapper.exe
          retention-days: 30

  attach:
    name: Attach to GitHub Release
    needs: build
    if: startsWith(github.ref, 'refs/tags/') || github.event_name == 'workflow_dispatch'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - name: Download built installer
        uses: actions/download-artifact@v4
        with:
          name: VideoKidnapper-windows
          path: dist/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload .exe to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "dist/VideoKidnapper.exe" --clobber
          else
            gh release create "$tag" "dist/VideoKidnapper.exe" \
              --title "$tag" \
              --notes "Windows .exe build for $tag. FFmpeg must be on PATH or installed via the in-app Setup dialog."
          fi
