# SPDX-License-Identifier: Apache-2.0
#
# On every tag push (v*.*.*), build the Microsoft Store submission
# package: PyInstaller exe -> VideoKidnapper.msix with FFmpeg bundled
# (the MSIX app container does not inherit PATH — see
# packaging/msix/README.md). The .msix is uploaded as a CI artifact for
# the maintainer to submit via Partner Center; it is deliberately NOT
# attached to the GitHub Release, because an unsigned MSIX cannot be
# installed by end users (the Store signs it after certification).
#
# Identity comes from repository variables (Settings -> Secrets and
# variables -> Actions -> Variables), copied verbatim from Partner
# Center's "Product identity" page after reserving the app name:
#
#   MSIX_IDENTITY_NAME       e.g. 12345AES256Afro.VideoKidnapper
#   MSIX_PUBLISHER           e.g. CN=xxxxxxxx-xxxx-xxxx-xxxx-xxxxxxxxxxxx
#   MSIX_PUBLISHER_DISPLAY   e.g. AES256Afro
#
# Until those are set, the build falls back to the CN=VideoKidnapperDev
# identity and the artifact is named *-dev-unsigned — good for container
# testing, useless for the Store.

name: MSIX (Microsoft Store)

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Self-test on PRs that touch the MSIX packaging.
  pull_request:
    paths:
      - ".github/workflows/msix.yml"
      - "packaging/msix/**"
      - "packaging/videokidnapper.spec"
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to build (e.g. v1.4.0); empty = current ref"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build Store MSIX
    runs-on: windows-latest
    steps:
      - uses: actions/checkout@v7
        with:
          # Dispatch with a tag builds that tag's code, not main's.
          ref: ${{ github.event.inputs.tag || github.ref }}

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install deps
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install "pyinstaller>=6.0"

      - name: Build exe
        shell: pwsh
        run: |
          python -m PyInstaller packaging/videokidnapper.spec --noconfirm --clean
          if (-not (Test-Path dist/VideoKidnapper.exe)) { throw "no exe produced" }

      - name: Fetch FFmpeg (GPL build — has libx264)
        shell: pwsh
        # Same BtbN source as the AppImage; GPL compliance = source link
        # in the Store listing (packaging/msix/README.md).
        run: |
          curl.exe -fsSL -o ffmpeg.zip https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-win64-gpl.zip
          Expand-Archive ffmpeg.zip -DestinationPath ffwork
          $bin = Get-ChildItem ffwork -Recurse -Filter ffmpeg.exe | Select-Object -First 1
          New-Item -ItemType Directory ffbin | Out-Null
          Copy-Item $bin.FullName ffbin/
          Copy-Item (Join-Path $bin.DirectoryName "ffprobe.exe") ffbin/
          ffbin/ffmpeg.exe -version | Select-Object -First 1

      - name: Resolve version + identity
        id: meta
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            raw="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            raw="${GITHUB_REF_NAME}"
          else
            raw="v0.0.0"
          fi
          echo "version=${raw#v}.0" >> "$GITHUB_OUTPUT"
          if [ -n "${{ vars.MSIX_IDENTITY_NAME }}" ]; then
            echo "store=true" >> "$GITHUB_OUTPUT"
            echo "suffix=store" >> "$GITHUB_OUTPUT"
          else
            echo "store=false" >> "$GITHUB_OUTPUT"
            echo "suffix=dev-unsigned" >> "$GITHUB_OUTPUT"
            echo "::notice::MSIX_IDENTITY_NAME repo variable not set - building with dev identity (not submittable)."
          fi

      - name: Locate makeappx (Windows SDK on the runner)
        id: sdk
        shell: pwsh
        run: |
          $mk = Get-ChildItem "C:\Program Files (x86)\Windows Kits\10\bin\*\x64\makeappx.exe" | Sort-Object FullName -Descending | Select-Object -First 1
          if (-not $mk) { throw "makeappx.exe not found on runner" }
          "makeappx=$($mk.FullName)" >> $env:GITHUB_OUTPUT

      - name: Build MSIX
        shell: pwsh
        run: |
          $identity = "${{ vars.MSIX_IDENTITY_NAME }}"; if (-not $identity) { $identity = "VideoKidnapperDev" }
          $publisher = "${{ vars.MSIX_PUBLISHER }}"; if (-not $publisher) { $publisher = "CN=VideoKidnapperDev" }
          $display = "${{ vars.MSIX_PUBLISHER_DISPLAY }}"; if (-not $display) { $display = "AES256Afro" }
          ./packaging/msix/build-msix.ps1 `
            -ExePath dist/VideoKidnapper.exe `
            -Version "${{ steps.meta.outputs.version }}" `
            -IdentityName $identity -Publisher $publisher -PublisherDisplay $display `
            -FFmpegDir ffbin `
            -MakeAppx "${{ steps.sdk.outputs.makeappx }}" `
            -OutFile dist/VideoKidnapper.msix

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: VideoKidnapper-msix-${{ steps.meta.outputs.suffix }}
          path: dist/VideoKidnapper.msix
          retention-days: 60
