# SPDX-License-Identifier: Apache-2.0
#
# On every tag push (v*.*.*), build the Linux artifacts from one
# PyInstaller one-dir bundle:
#   - VideoKidnapper-x86_64.AppImage (bundled FFmpeg; Bazzite/SteamOS)
#   - videokidnapper_<ver>_amd64.deb (Depends: ffmpeg; Ubuntu/Debian)
# then attach both to the GitHub Release and publish the .deb to the
# signed APT repo at AES256Afro/apt (GitHub Pages), so
# `apt-get install videokidnapper` works after the one-time repo add.
# Mirrors installer.yml's structure; independent of the other release
# workflows so a failure in one doesn't block the others.

name: Linux packages

on:
  push:
    tags:
      - "v[0-9]+.[0-9]+.[0-9]+"
      - "v[0-9]+.[0-9]+.[0-9]+-*"
  # Self-test on PRs that touch the Linux packaging (build + smoke
  # test only; the attach job is gated to tags/dispatch below).
  pull_request:
    paths:
      - ".github/workflows/appimage.yml"
      - "packaging/videokidnapper-linux.spec"
      - "packaging/appimage/**"
      - "packaging/deb/**"
  # Manual dispatch: rebuild for an existing tag, or build a test
  # artifact from any branch (leave `tag` empty to skip the release
  # attach and just get the CI artifact).
  workflow_dispatch:
    inputs:
      tag:
        description: "Tag to attach the AppImage to (e.g. v1.4.0); empty = artifact only"
        required: false
        default: ""

permissions:
  contents: read

jobs:
  build:
    name: Build AppImage + deb
    # Oldest supported LTS = oldest glibc the binary requires = widest
    # distro compatibility. Bump deliberately, not by adopting -latest.
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v7

      - uses: actions/setup-python@v6
        with:
          python-version: "3.12"
          cache: pip

      - name: Install system deps
        # libfuse2: lets appimagetool/AppImages run unextracted on the
        # runner. tk/tcl: shared libs PyInstaller bundles for tkinter.
        run: |
          sudo apt-get update
          sudo apt-get install -y --no-install-recommends libfuse2 tk8.6 tcl8.6

      - name: Install Python deps
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          # OpenCV (headless contrib: CSRT tracker, no GUI libs) for auto-track.
          pip install "opencv-contrib-python-headless>=4.8"
          pip install "pyinstaller>=6.0"
          python -c "import tkinter; print('tkinter OK')"

      - name: Build one-dir bundle
        run: |
          python -m PyInstaller packaging/videokidnapper-linux.spec --noconfirm --clean
          test -x dist/VideoKidnapper/VideoKidnapper

      - name: Fetch FFmpeg (GPL build — has libx264)
        # The app's software fallback and GIF intermediate pass are
        # libx264, which only the GPL builds include. GPL compliance:
        # ffmpeg runs as a separate process (mere aggregation; the app
        # stays Apache-2.0) and the release notes link BtbN's source.
        # See packaging/appimage/README.md for the full reasoning.
        run: |
          curl -fsSL -o ffmpeg.tar.xz \
            https://github.com/BtbN/FFmpeg-Builds/releases/download/latest/ffmpeg-master-latest-linux64-gpl.tar.xz
          tar -xf ffmpeg.tar.xz
          FFDIR=$(find . -maxdepth 1 -type d -name 'ffmpeg-*-gpl*' | head -1)
          install -m 755 "$FFDIR/bin/ffmpeg" "$FFDIR/bin/ffprobe" .
          ./ffmpeg -version | head -1

      - name: Assemble AppDir
        run: |
          mkdir -p AppDir/usr/bin AppDir/usr/app
          cp -r dist/VideoKidnapper/. AppDir/usr/app/
          install -m 755 ffmpeg ffprobe AppDir/usr/bin/
          install -m 755 packaging/appimage/AppRun AppDir/AppRun
          cp packaging/appimage/videokidnapper.desktop AppDir/
          cp assets/branding/logo-512.png AppDir/videokidnapper.png
          ln -sf videokidnapper.png AppDir/.DirIcon

      - name: Build AppImage
        run: |
          curl -fsSL -o appimagetool \
            https://github.com/AppImage/appimagetool/releases/download/continuous/appimagetool-x86_64.AppImage
          chmod +x appimagetool
          ARCH=x86_64 ./appimagetool --appimage-extract-and-run AppDir VideoKidnapper-x86_64.AppImage
          ls -la VideoKidnapper-x86_64.AppImage

      - name: Smoke-test — --help exits 0
        # argparse handles --help before Tk needs a display, so this
        # catches import-time / bundling regressions on a headless
        # runner (same trick as the Windows workflow).
        run: |
          chmod +x VideoKidnapper-x86_64.AppImage
          ./VideoKidnapper-x86_64.AppImage --appimage-extract-and-run --help
          ./VideoKidnapper-x86_64.AppImage --appimage-extract-and-run --selftest

      - name: Resolve deb version
        id: version
        shell: bash
        # Tag → 1.4.0; dispatch with tag → same; PR/self-test builds get
        # a throwaway 0.0.0+dev version (never published anywhere).
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ] && [ -n "${{ github.event.inputs.tag }}" ]; then
            raw="${{ github.event.inputs.tag }}"
          elif [ "${{ github.event_name }}" = "push" ]; then
            raw="${GITHUB_REF_NAME}"
          else
            raw="v0.0.0+dev${GITHUB_RUN_NUMBER}"
          fi
          echo "version=${raw#v}" >> "$GITHUB_OUTPUT"

      - name: Build .deb
        run: |
          packaging/deb/build-deb.sh \
            "${{ steps.version.outputs.version }}" \
            dist/VideoKidnapper \
            "videokidnapper_${{ steps.version.outputs.version }}_amd64.deb"
          # The apt repo is git-backed Pages with a hard 100 MB per-file
          # limit. Fail the build here (on PRs too) rather than at publish
          # time on a tag, if the .deb ever creeps over ~95 MB.
          sz=$(stat -c%s videokidnapper_*_amd64.deb)
          echo ".deb size: $((sz/1024/1024)) MB"
          if [ "$sz" -gt 99614720 ]; then
            echo "::error::.deb exceeds 95 MB — would break the apt repo push (GitHub 100 MB git limit). Trim the bundle."
            exit 1
          fi

      - name: Smoke-test .deb — install + --help
        # Real dpkg install on the runner: catches broken symlinks,
        # missing Depends, and control-file mistakes.
        run: |
          sudo apt-get install -y ./videokidnapper_*.deb
          videokidnapper --help
          # NB: no --selftest here — the .deb strips OpenCV to stay under
          # the apt repo's 100 MB limit, so auto-track is intentionally
          # absent (the AppImage smoke test above asserts it IS present).
          sudo apt-get remove -y videokidnapper

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: VideoKidnapper-linux
          path: |
            VideoKidnapper-x86_64.AppImage
            videokidnapper_*_amd64.deb
          retention-days: 30

  attach:
    name: Attach to GitHub Release
    needs: build
    # Attach on tag pushes, or on manual dispatch when a tag was given.
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v7

      - name: Download built AppImage
        uses: actions/download-artifact@v8
        with:
          name: VideoKidnapper-linux
          path: dist/

      - name: Resolve tag
        id: tag
        shell: bash
        run: |
          if [ "${{ github.event_name }}" = "workflow_dispatch" ]; then
            echo "tag=${{ github.event.inputs.tag }}" >> "$GITHUB_OUTPUT"
          else
            echo "tag=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"
          fi

      - name: Upload Linux artifacts to release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          tag="${{ steps.tag.outputs.tag }}"
          shopt -s nullglob
          assets=(dist/VideoKidnapper-x86_64.AppImage dist/videokidnapper_*_amd64.deb)
          if gh release view "$tag" >/dev/null 2>&1; then
            gh release upload "$tag" "${assets[@]}" --clobber
          else
            gh release create "$tag" "${assets[@]}" \
              --title "$tag" \
              --notes $'Linux builds for '"$tag"$'.\n\n- `VideoKidnapper-x86_64.AppImage` — download, `chmod +x`, run. FFmpeg included; no Python required. Works on glibc 2.35+ distros (Ubuntu 22.04+, Fedora 36+, Bazzite, SteamOS 3+).\n- `videokidnapper_*_amd64.deb` — Ubuntu/Debian package (`sudo apt install ./videokidnapper_*.deb`), or add the [APT repo](https://github.com/AES256Afro/apt) once and get updates via `apt upgrade`.\n\nThe AppImage\'s bundled FFmpeg is a GPL build from [BtbN/FFmpeg-Builds](https://github.com/BtbN/FFmpeg-Builds) (source available there per the GPL); the .deb depends on your distro\'s ffmpeg instead.'
          fi

  publish-apt:
    name: Publish to APT repo
    needs: attach
    if: startsWith(github.ref, 'refs/tags/') || (github.event_name == 'workflow_dispatch' && github.event.inputs.tag != '')
    runs-on: ubuntu-latest
    steps:
      - name: Download built packages
        uses: actions/download-artifact@v8
        with:
          name: VideoKidnapper-linux
          path: dist/

      - name: Import signing key
        env:
          APT_GPG_PRIVATE_KEY: ${{ secrets.APT_GPG_PRIVATE_KEY }}
        run: |
          echo "$APT_GPG_PRIVATE_KEY" | gpg --batch --import
          gpg --list-secret-keys --keyid-format long

      - name: Clone apt repo (deploy key)
        env:
          APT_REPO_DEPLOY_KEY: ${{ secrets.APT_REPO_DEPLOY_KEY }}
        run: |
          mkdir -p ~/.ssh
          echo "$APT_REPO_DEPLOY_KEY" > ~/.ssh/apt_deploy
          chmod 600 ~/.ssh/apt_deploy
          ssh-keyscan github.com >> ~/.ssh/known_hosts 2>/dev/null
          GIT_SSH_COMMAND="ssh -i ~/.ssh/apt_deploy" \
            git clone git@github.com:AES256Afro/apt.git apt-repo

      - name: Add package + regenerate signed indexes
        run: |
          cd apt-repo
          mkdir -p pool/main/v/videokidnapper dists/stable/main/binary-amd64
          cp ../dist/videokidnapper_*_amd64.deb pool/main/v/videokidnapper/
          # Package index (paths relative to repo root, per APT spec)
          apt-ftparchive --arch amd64 packages pool > dists/stable/main/binary-amd64/Packages
          gzip -9 -kf dists/stable/main/binary-amd64/Packages
          # Release + signatures
          apt-ftparchive \
            -o APT::FTPArchive::Release::Origin="VideoKidnapper" \
            -o APT::FTPArchive::Release::Label="VideoKidnapper" \
            -o APT::FTPArchive::Release::Suite="stable" \
            -o APT::FTPArchive::Release::Codename="stable" \
            -o APT::FTPArchive::Release::Components="main" \
            -o APT::FTPArchive::Release::Architectures="amd64" \
            release dists/stable > dists/stable/Release
          gpg --batch --yes -abs -o dists/stable/Release.gpg dists/stable/Release
          gpg --batch --yes --clearsign -o dists/stable/InRelease dists/stable/Release

      - name: Commit and push
        env:
          APT_REPO_DEPLOY_KEY_PATH: ~/.ssh/apt_deploy
        run: |
          cd apt-repo
          git config user.name "videokidnapper-ci"
          git config user.email "sinth.tek@gmail.com"
          git add -A
          git commit -m "videokidnapper $(basename ../dist/videokidnapper_*_amd64.deb .deb | cut -d_ -f2)"
          GIT_SSH_COMMAND="ssh -i ~/.ssh/apt_deploy" git push
