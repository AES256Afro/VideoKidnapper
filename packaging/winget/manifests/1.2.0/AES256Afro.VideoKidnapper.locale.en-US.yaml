ReleaseNotes: |-
  1.2.0 — major feature batch. See the full changelog for each item:
  https://github.com/AES256Afro/VideoKidnapper/blob/main/CHANGELOG.md

  Headline features:
  - Undo / redo (Ctrl+Z / Ctrl+Y) across the whole editor
  - Thumbnail strip above the timeline (click to seek)
  - Snap-to-guides when dragging text layers
  - Color grade sliders (brightness / contrast / saturation / gamma)
  - Transitions between queued ranges (crossfade / fade-to-black / fade-to-white)
  - Whisper-powered auto-captions
  - Image / logo overlay track
  - Real-time video + audio playback via imageio-ffmpeg + sounddevice
  - Plugin system (entry-point discovery, Apache-2.0 core + any-license plugins)
  - Tier-1 robustness fixes (ffprobe crash, yt-dlp timeout, concurrent-write settings race)

ReleaseNotesUrl: https://github.com/AES256Afro/VideoKidnapper/releases/tag/v1.2.0

