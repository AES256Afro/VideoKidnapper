ShortDescription: Dark-themed desktop tool for trimming videos, downloading clips from the open web, and exporting polished GIFs or MP4s with text overlays.
Description: |-
  VideoKidnapper is a dark-themed desktop app (Windows / macOS / Linux) that
  trims local video files or downloaded clips from YouTube, Instagram,
  Bluesky, Twitter/X, Reddit, and Facebook, then exports polished GIFs or
  MP4s with pixel-accurate text overlays.

  Features include multi-range trimming, undo / redo, a scrubbable
  thumbnail strip, snap-to-guides when positioning text, auto-captions
  via Whisper, image overlays, color grading, transitions between
  queued ranges, and a plugin system for third-party extensions.

  FFmpeg is a runtime prerequisite — the in-app Setup dialog can pull a
  portable build on first launch if one isn't already on PATH.

