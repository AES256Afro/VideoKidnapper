#
# mypy configuration.
#
# STRATEGY: soft-start. The project has ~8000 LOC, most of it UI /
# subprocess plumbing that's painful to type (Tkinter and customtkinter
# have no type stubs; yt-dlp's API is loosely typed; ffmpeg subprocess
# dicts are inherently dynamic). Blanket strict mode across the whole
# tree would produce hundreds of errors that aren't meaningful to fix.
#
# Instead: `strict = true` as the default, then allowlist specific
# modules via `[mypy-…]` sections. The default stays strict so newly-
# added modules start typed; older modules opt out until someone
# annotates them. The "typed set" grows organically.
#
# CI runs `mypy --config-file mypy.ini videokidnapper` which honors the
# per-module overrides below.

[mypy]
python_version = 3.9
strict = true
# Pretty output in CI logs (short enough to scan, wide enough to read).
pretty = true
show_error_codes = true
warn_unused_configs = true
# Tkinter + customtkinter ship no stubs; yt-dlp is loosely typed; PIL
# has partial stubs that aren't worth the churn. Let mypy silently skip
# these imports instead of flooding every file that touches them.
ignore_missing_imports = true

# ---------------------------------------------------------------------------
# Module overrides — everything NOT in this list is excluded from strict
# checking by the default_typed_modules wildcard below.
# ---------------------------------------------------------------------------
#
# Typed modules (pass `mypy --strict`):
#   - videokidnapper.utils.time_format
#   - videokidnapper.utils.ffmpeg_escape
#   - videokidnapper.utils.file_naming
#   - videokidnapper.utils.size_estimator
#   - videokidnapper.utils.undo
#   - videokidnapper.utils.snap
#   - videokidnapper.config            (PRESETS TypedDict)
#
# When you type-annotate a new module, remove it from the excludes below.

# Default: exclude everything.
[mypy-videokidnapper.*]
ignore_errors = true

# Overrides: typed modules are NOT excluded → strict mode applies.
[mypy-videokidnapper.config]
ignore_errors = false

[mypy-videokidnapper.utils.time_format]
ignore_errors = false

[mypy-videokidnapper.utils.ffmpeg_escape]
ignore_errors = false

[mypy-videokidnapper.utils.file_naming]
ignore_errors = false

[mypy-videokidnapper.utils.size_estimator]
ignore_errors = false

[mypy-videokidnapper.utils.undo]
ignore_errors = false

[mypy-videokidnapper.utils.snap]
ignore_errors = false
